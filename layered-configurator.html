<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akaali Arsenal | Layered Configurator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0a0a0a;
      color: #fff;
      padding: 20px;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    h1 { color: #c8a04d; margin: 30px 0 10px; font-size: 28px; }
    p { color: #aaa; margin-bottom: 20px; }
    
    .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin: 40px 0; align-items: start; }
    
    /* LAYER PREVIEW */
    .preview-box {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 20px;
      aspect-ratio: 3/4;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .layer-stack {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 500px;
      max-height: 800px;
    }
    
    .layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    
    .layer img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    
    .layer.blade {
      z-index: 1;
    }
    
    .layer.hilt {
      z-index: 2;
    }
    
    .layer.finish {
      z-index: 3;
    }
    
    .loading-msg {
      position: absolute;
      color: #666;
      font-size: 14px;
      z-index: 0;
    }
    
    /* CONTROLS */
    .controls { }
    .control-section { margin-bottom: 40px; }
    .control-label { font-weight: 600; color: #c8a04d; margin-bottom: 12px; display: block; font-size: 14px; letter-spacing: 0.5px; text-transform: uppercase; }
    
    .button-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
    button {
      padding: 10px 16px;
      background: #222;
      border: 1px solid #444;
      color: #aaa;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    button:hover {
      border-color: #c8a04d;
      color: #c8a04d;
    }
    button.active {
      background: #c8a04d;
      color: #000;
      border-color: #c8a04d;
      font-weight: 600;
    }
    
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .hilt-tile {
      position: relative;
      aspect-ratio: 1;
      background: #222;
      border: 2px solid #444;
      border-radius: 6px;
      cursor: pointer;
      overflow: hidden;
      transition: all 0.2s;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .hilt-tile:hover {
      border-color: #c8a04d;
    }
    .hilt-tile.active {
      border-color: #c8a04d;
      box-shadow: 0 0 12px rgba(200, 160, 77, 0.3);
    }
    .hilt-thumb {
      width: 100%;
      height: 70%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hilt-thumb img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    .hilt-label {
      font-size: 11px;
      color: #aaa;
      text-align: center;
      padding: 4px;
      width: 100%;
      border-top: 1px solid #333;
    }
    .hilt-tile.active .hilt-label {
      color: #c8a04d;
    }
    
    .status {
      margin: 20px 0;
      padding: 12px;
      background: #222;
      border-left: 3px solid #c8a04d;
      border-radius: 4px;
      color: #aaa;
      font-size: 13px;
    }
    .status.error {
      border-left-color: #ff6b6b;
      color: #ff6b6b;
    }
    .status.loading {
      color: #c8a04d;
    }
    
    .preload-indicator {
      margin-top: 15px;
      padding: 10px;
      background: #1a1a1a;
      border-radius: 4px;
      font-size: 12px;
      color: #666;
    }
    
    @media (max-width: 1000px) {
      .layout { grid-template-columns: 1fr; gap: 30px; }
      .grid-4 { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 600px) {
      .grid-4 { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>⚔️ Akaali Arsenal | Layered Configurator</h1>
  <p>Real-time blade + hilt composition. True layered rendering.</p>

  <div class="layout">
    <!-- PREVIEW -->
    <div class="preview-box">
      <div class="layer-stack" id="layerStack">
        <div class="loading-msg">Loading...</div>
      </div>
    </div>

    <!-- CONTROLS -->
    <div class="controls">
      
      <div class="control-section">
        <label class="control-label">1. Weapon</label>
        <div class="button-group" id="weaponBtns"></div>
      </div>

      <div class="control-section">
        <label class="control-label">2. Size (in.)</label>
        <div class="button-group" id="sizeBtns"></div>
      </div>

      <div class="control-section">
        <label class="control-label">3. Hilt Material</label>
        <div class="grid-4" id="hiltBtns"></div>
      </div>

      <div class="status" id="status">Initializing...</div>
      <div class="preload-indicator" id="preloadInfo"></div>

    </div>
  </div>
</div>

<script>
const GITHUB_RAW = "https://raw.githubusercontent.com/Akaali-Daljit/Akaali-Store/images";

/* ===== DATA STRUCTURES ===== */

const WEAPONS = [
  { id: "peshkabz", name: "Peshkabz", sizes: [12, 14, 16, 18] },
  { id: "kard", name: "Kard", sizes: [12, 14, 16, 18] },
  { id: "katar", name: "Katar", sizes: [14, 18, 20] },
  { id: "bichhua", name: "Bichhua", sizes: [12, 14, 16, 18] },
  { id: "jambiya", name: "Jambiya", sizes: [12, 14] },
  { id: "khanjar", name: "Khanjar", sizes: [12, 14, 16, 18] }
];

const HILTS = [
  { id: "camel-bone", name: "Camel Bone", file: "Camel%20Bone%20Hilt%20free.jpeg" },
  { id: "silver", name: "Silver", file: "Silver%20Hilt%20200.jpeg" },
  { id: "black-silver", name: "Black Silver", file: "Black%20with%20Silver%20Koftgari%2050.jpeg" },
  { id: "jade", name: "Jade", file: "Jade%20Hilt%20150.jpeg" },
  { id: "agate", name: "Agate", file: "Agate%20Hilt.jpeg" },
  { id: "sodamite", name: "Sodamite", file: "Sodamite%20Hilt%20150.jpeg" },
  { id: "hilt-250", name: "Ornate 250", file: "Hilt%20250.jpeg" },
  { id: "hilt-silver-100", name: "Silver Thick", file: "Hilt%20Silver%20Thick%20100.jpeg" }
];

const BLADE_MAPPING = {
  "peshkabz_12": "PESHKABZ%2012%2014.jpeg",
  "peshkabz_14": "PESHKABZ%2012%2014.jpeg",
  "peshkabz_16": "PESHKABZ%2016,%2018%20(1).jpeg",
  "peshkabz_18": "PESHKABZ%2016,%2018%20(1).jpeg",
  "kard_12": "Kard%2012%20inch%20blade.jpeg",
  "kard_14": "Kard%2014,%2016,%2018%20inch.png",
  "kard_16": "Kard%2014,%2016,%2018%20inch.png",
  "kard_18": "Kard%2014,%2016,%2018%20inch.png",
  "katar_14": "14%20inch%20katar.jpeg",
  "katar_18": "18%20inch%20katar.png",
  "katar_20": "Hooded%20Katar%2020%20inch.png",
  "bichhua_12": "BICHHUA%2012.png",
  "bichhua_14": "Bichhua%2014,%2016,%2018.jpeg",
  "bichhua_16": "Bichhua%2014,%2016,%2018.jpeg",
  "bichhua_18": "Bichhua%2014,%2016,%2018.jpeg",
  "jambiya_12": "Jambia%2012%2014%20inch%20blade.jpeg",
  "jambiya_14": "Jambia%2012%2014%20inch%20blade.jpeg",
  "khanjar_12": "Khanjar%2012.jpeg",
  "khanjar_14": "Khanjar%2014,%2016%20and%2018%20inch.jpeg",
  "khanjar_16": "Khanjar%2014,%2016%20and%2018%20inch.jpeg",
  "khanjar_18": "Khanjar%2014,%2016%20and%2018%20inch.jpeg"
};

/* METADATA-DRIVEN POSITIONING SYSTEM */
/* Base positions for each weapon at reference size (12")
   Size multiplier scales these proportionally */

const BASE_POSITIONS = {
  peshkabz: { x: 120, y: 550, w: 260, h: 170, refSize: 12, sizeMultiplier: 0.015 },
  kard: { x: 150, y: 570, w: 200, h: 160, refSize: 12, sizeMultiplier: 0.02 },
  katar: { x: 140, y: 560, w: 220, h: 180, refSize: 14, sizeMultiplier: 0.025 },
  bichhua: { x: 160, y: 580, w: 180, h: 150, refSize: 12, sizeMultiplier: 0.02 },
  jambiya: { x: 140, y: 570, w: 220, h: 170, refSize: 12, sizeMultiplier: 0.015 },
  khanjar: { x: 140, y: 570, w: 220, h: 170, refSize: 12, sizeMultiplier: 0.02 }
};

/* OVERLAY SYSTEM (future-ready) */
const FINISHES = {
  none: null,
  "partial-koftgari": { folder: "finishes", file: null }, // to be added
  "heavy-koftgari": { folder: "finishes", file: null },
  "khudai": { folder: "finishes", file: null }
};

/* ===== IMAGE CACHE & PRELOADING ===== */

class ImageCache {
  constructor() {
    this.cache = new Map();
    this.loading = new Set();
    this.failed = new Set();
  }

  async load(url) {
    if (this.cache.has(url)) return this.cache.get(url);
    if (this.failed.has(url)) throw new Error(`Failed to load: ${url}`);

    this.loading.add(url);
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.onload = () => {
        this.cache.set(url, img);
        this.loading.delete(url);
        resolve(img);
      };
      img.onerror = () => {
        this.failed.add(url);
        this.loading.delete(url);
        reject(new Error(`Failed to load: ${url}`));
      };
      img.src = url;
    });
  }

  async preload(urls) {
    return Promise.allSettled(urls.map(url => this.load(url)));
  }

  getLoadingCount() {
    return this.loading.size;
  }

  isLoaded(url) {
    return this.cache.has(url);
  }
}

const imageCache = new ImageCache();

/* ===== POSITIONING CALCULATOR ===== */

function calculateHiltPosition(weapon, size) {
  const base = BASE_POSITIONS[weapon];
  if (!base) throw new Error(`Unknown weapon: ${weapon}`);

  const sizeDiff = size - base.refSize;
  const scale = 1 + sizeDiff * base.sizeMultiplier;

  return {
    x: Math.round(base.x * scale),
    y: Math.round(base.y * scale),
    w: Math.round(base.w * scale),
    h: Math.round(base.h * scale)
  };
}

/* ===== LAYER RENDERER ===== */

class LayeredRenderer {
  constructor(containerId) {
    this.container = document.getElementById(containerId);
    this.layers = {};
  }

  clear() {
    this.container.innerHTML = "";
    this.layers = {};
  }

  createLayer(name, zIndex) {
    const layer = document.createElement("div");
    layer.className = `layer ${name}`;
    layer.style.zIndex = zIndex;
    this.container.appendChild(layer);
    return layer;
  }

  async renderBlade(url) {
    if (!this.layers.blade) this.layers.blade = this.createLayer("blade", 1);
    const layer = this.layers.blade;
    layer.innerHTML = "";

    const img = await imageCache.load(url);
    const imgEl = document.createElement("img");
    imgEl.src = url;
    imgEl.alt = "Blade";
    layer.appendChild(imgEl);
  }

  async renderHilt(url, position) {
    if (!this.layers.hilt) this.layers.hilt = this.createLayer("hilt", 2);
    const layer = this.layers.hilt;
    layer.innerHTML = "";

    const img = await imageCache.load(url);
    const imgEl = document.createElement("img");
    imgEl.src = url;
    imgEl.alt = "Hilt";
    
    // Apply positioning
    imgEl.style.position = "absolute";
    imgEl.style.left = position.x + "px";
    imgEl.style.top = position.y + "px";
    imgEl.style.width = position.w + "px";
    imgEl.style.height = position.h + "px";
    imgEl.style.objectFit = "contain";

    layer.appendChild(imgEl);
  }

  async renderFinish(url, zIndex) {
    if (!this.layers.finish) this.layers.finish = this.createLayer("finish", zIndex || 3);
    const layer = this.layers.finish;
    layer.innerHTML = "";

    const img = await imageCache.load(url);
    const imgEl = document.createElement("img");
    imgEl.src = url;
    imgEl.alt = "Finish";
    layer.appendChild(imgEl);
  }
}

/* ===== STATE & RENDERING ===== */

let state = { weapon: "peshkabz", size: 12, hilt: "camel-bone", finish: "none" };
const renderer = new LayeredRenderer("layerStack");

const statusEl = document.getElementById("status");
const preloadEl = document.getElementById("preloadInfo");

function updateStatus(msg, isError = false) {
  statusEl.textContent = msg;
  statusEl.className = isError ? "status error" : "status";
}

async function render() {
  try {
    updateStatus("Rendering...");
    
    const key = `${state.weapon}_${state.size}`;
    const bladeFile = BLADE_MAPPING[key];
    const hilt = HILTS.find(h => h.id === state.hilt);

    if (!bladeFile || !hilt) {
      throw new Error("Invalid configuration");
    }

    const bladeUrl = `${GITHUB_RAW}/${bladeFile}`;
    const hiltUrl = `${GITHUB_RAW}/${hilt.file}`;
    const position = calculateHiltPosition(state.weapon, state.size);

    // Render layers
    await renderer.renderBlade(bladeUrl);
    await renderer.renderHilt(hiltUrl, position);

    // Finish overlay (future)
    // if (state.finish !== "none") {
    //   const finishCfg = FINISHES[state.finish];
    //   await renderer.renderFinish(...);
    // }

    updateStatus(`✓ ${state.weapon} ${state.size}" + ${hilt.name}`);
  } catch (err) {
    console.error(err);
    updateStatus(`✗ ${err.message}`, true);
  }
}

function renderWeapons() {
  const container = document.getElementById("weaponBtns");
  container.innerHTML = "";
  WEAPONS.forEach(w => {
    const btn = document.createElement("button");
    btn.textContent = w.name;
    btn.className = state.weapon === w.id ? "active" : "";
    btn.onclick = () => {
      state.weapon = w.id;
      state.size = w.sizes[0];
      renderWeapons();
      renderSizes();
      render();
    };
    container.appendChild(btn);
  });
}

function renderSizes() {
  const container = document.getElementById("sizeBtns");
  container.innerHTML = "";
  const weapon = WEAPONS.find(w => w.id === state.weapon);
  weapon.sizes.forEach(size => {
    const btn = document.createElement("button");
    btn.textContent = size;
    btn.className = state.size === size ? "active" : "";
    btn.onclick = () => {
      state.size = size;
      renderSizes();
      render();
    };
    container.appendChild(btn);
  });
}

function renderHilts() {
  const container = document.getElementById("hiltBtns");
  container.innerHTML = "";
  HILTS.forEach(h => {
    const tile = document.createElement("button");
    tile.className = "hilt-tile" + (state.hilt === h.id ? " active" : "");
    
    const thumb = document.createElement("div");
    thumb.className = "hilt-thumb";
    const img = document.createElement("img");
    img.src = `${GITHUB_RAW}/${h.file}`;
    img.alt = h.name;
    img.loading = "lazy";
    thumb.appendChild(img);

    const label = document.createElement("div");
    label.className = "hilt-label";
    label.textContent = h.name;

    tile.appendChild(thumb);
    tile.appendChild(label);
    
    tile.onclick = () => {
      state.hilt = h.id;
      renderHilts();
      render();
    };
    
    container.appendChild(tile);
  });
}

/* ===== PRELOADING ===== */

async function preloadImages() {
  const urls = new Set();

  // All blade images
  Object.values(BLADE_MAPPING).forEach(file => {
    urls.add(`${GITHUB_RAW}/${file}`);
  });

  // All hilt images
  HILTS.forEach(h => {
    urls.add(`${GITHUB_RAW}/${h.file}`);
  });

  preloadEl.textContent = `Preloading ${urls.size} images...`;
  
  const results = await imageCache.preload(Array.from(urls));
  const loaded = results.filter(r => r.status === "fulfilled").length;
  const failed = results.filter(r => r.status === "rejected").length;

  preloadEl.innerHTML = `<strong>Preload complete:</strong> ${loaded} loaded, ${failed} failed`;
}

/* ===== INIT ===== */

window.addEventListener("DOMContentLoaded", async () => {
  renderWeapons();
  renderSizes();
  renderHilts();
  
  preloadImages();
  
  await render();
});
</script>

</body>
</html>
