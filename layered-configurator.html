<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akaali Arsenal | Configurator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0a0a0a;
      color: #fff;
      padding: 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { color: #c8a04d; margin: 30px 0 10px; }
    p { color: #aaa; margin-bottom: 20px; }
    
    .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin: 40px 0; }
    
    .canvas-box { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 20px; }
    canvas { width: 100%; height: auto; border-radius: 4px; background: #222; }
    
    .controls { }
    .control-section { margin-bottom: 30px; }
    .control-label { font-weight: 600; color: #c8a04d; margin-bottom: 10px; display: block; }
    
    .button-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
    button {
      padding: 10px 16px;
      background: #222;
      border: 1px solid #444;
      color: #aaa;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    button:hover {
      border-color: #c8a04d;
      color: #c8a04d;
    }
    button.active {
      background: #c8a04d;
      color: #000;
      border-color: #c8a04d;
    }
    
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .grid-item { position: relative; }
    .grid-item button { width: 100%; padding: 12px; display: flex; flex-direction: column; align-items: center; gap: 6px; min-height: 100px; }
    .grid-item label { font-size: 12px; text-align: center; }
    
    .status { margin: 20px 0; padding: 10px; background: #222; border-left: 3px solid #c8a04d; border-radius: 4px; color: #aaa; min-height: 20px; }
    
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .grid-4 { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>⚔️ Akaali Arsenal Configurator</h1>
  <p>Select weapon, size, and hilt. Watch it render live.</p>

  <div class="layout">
    <!-- CANVAS -->
    <div class="canvas-box">
      <canvas id="canvas" width="500" height="800"></canvas>
      <div class="status" id="status">Loading...</div>
    </div>

    <!-- CONTROLS -->
    <div class="controls">
      
      <div class="control-section">
        <label class="control-label">1. Weapon</label>
        <div class="button-group" id="weaponBtns"></div>
      </div>

      <div class="control-section">
        <label class="control-label">2. Size</label>
        <div class="button-group" id="sizeBtns"></div>
      </div>

      <div class="control-section">
        <label class="control-label">3. Hilt Material</label>
        <div class="grid-4" id="hiltBtns"></div>
      </div>

    </div>
  </div>
</div>

<script>
const GITHUB_RAW = "https://raw.githubusercontent.com/Akaali-Daljit/Akaali-Store/images";

const WEAPONS = [
  { id: "peshkabz", name: "Peshkabz", sizes: [12, 14, 16, 18] },
  { id: "kard", name: "Kard", sizes: [12, 14, 16, 18] },
  { id: "katar", name: "Katar", sizes: [14, 18, 20] },
  { id: "bichhua", name: "Bichhua", sizes: [12, 14, 16, 18] },
  { id: "jambiya", name: "Jambiya", sizes: [12, 14] },
  { id: "khanjar", name: "Khanjar", sizes: [12, 14, 16, 18] }
];

const HILTS = [
  { id: "camel-bone", name: "Camel Bone", file: "Camel%20Bone%20Hilt%20free.jpeg" },
  { id: "silver", name: "Silver", file: "Silver%20Hilt%20200.jpeg" },
  { id: "black-silver", name: "Black Silver", file: "Black%20with%20Silver%20Koftgari%2050.jpeg" },
  { id: "jade", name: "Jade", file: "Jade%20Hilt%20150.jpeg" },
  { id: "agate", name: "Agate", file: "Agate%20Hilt.jpeg" },
  { id: "sodamite", name: "Sodamite", file: "Sodamite%20Hilt%20150.jpeg" },
  { id: "hilt-250", name: "Ornate 250", file: "Hilt%20250.jpeg" },
  { id: "hilt-silver-100", name: "Silver Thick", file: "Hilt%20Silver%20Thick%20100.jpeg" }
];

const BLADES = {
  "peshkabz_12": "PESHKABZ%2012%2014.jpeg",
  "peshkabz_14": "PESHKABZ%2012%2014.jpeg",
  "peshkabz_16": "PESHKABZ%2016,%2018%20(1).jpeg",
  "peshkabz_18": "PESHKABZ%2016,%2018%20(1).jpeg",
  "kard_12": "Kard%2012%20inch%20blade.jpeg",
  "kard_14": "Kard%2014,%2016,%2018%20inch.png",
  "kard_16": "Kard%2014,%2016,%2018%20inch.png",
  "kard_18": "Kard%2014,%2016,%2018%20inch.png",
  "katar_14": "14%20inch%20katar.jpeg",
  "katar_18": "18%20inch%20katar.png",
  "katar_20": "Hooded%20Katar%2020%20inch.png",
  "bichhua_12": "BICHHUA%2012.png",
  "bichhua_14": "Bichhua%2014,%2016,%2018.jpeg",
  "bichhua_16": "Bichhua%2014,%2016,%2018.jpeg",
  "bichhua_18": "Bichhua%2014,%2016,%2018.jpeg",
  "jambiya_12": "Jambia%2012%2014%20inch%20blade.jpeg",
  "jambiya_14": "Jambia%2012%2014%20inch%20blade.jpeg",
  "khanjar_12": "Khanjar%2012.jpeg",
  "khanjar_14": "Khanjar%2014,%2016%20and%2018%20inch.jpeg",
  "khanjar_16": "Khanjar%2014,%2016%20and%2018%20inch.jpeg",
  "khanjar_18": "Khanjar%2014,%2016%20and%2018%20inch.jpeg"
};

const POSITIONS = {
  "peshkabz_12": { x: 120, y: 550, w: 260, h: 170 },
  "peshkabz_14": { x: 100, y: 560, w: 300, h: 180 },
  "peshkabz_16": { x: 80, y: 570, w: 340, h: 190 },
  "peshkabz_18": { x: 60, y: 580, w: 380, h: 200 },
  "kard_12": { x: 150, y: 570, w: 200, h: 160 },
  "kard_14": { x: 130, y: 575, w: 240, h: 170 },
  "kard_16": { x: 110, y: 580, w: 280, h: 180 },
  "kard_18": { x: 90, y: 585, w: 320, h: 190 },
  "katar_14": { x: 140, y: 560, w: 220, h: 180 },
  "katar_18": { x: 110, y: 570, w: 280, h: 200 },
  "katar_20": { x: 80, y: 580, w: 340, h: 220 },
  "bichhua_12": { x: 160, y: 580, w: 180, h: 150 },
  "bichhua_14": { x: 140, y: 585, w: 220, h: 160 },
  "bichhua_16": { x: 120, y: 590, w: 260, h: 170 },
  "bichhua_18": { x: 100, y: 595, w: 300, h: 180 },
  "jambiya_12": { x: 140, y: 570, w: 220, h: 170 },
  "jambiya_14": { x: 120, y: 575, w: 260, h: 180 },
  "khanjar_12": { x: 140, y: 570, w: 220, h: 170 },
  "khanjar_14": { x: 120, y: 575, w: 260, h: 180 },
  "khanjar_16": { x: 100, y: 580, w: 300, h: 190 },
  "khanjar_18": { x: 80, y: 585, w: 340, h: 200 }
};

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const status = document.getElementById("status");

let state = { weapon: "peshkabz", size: 12, hilt: "camel-bone" };
const cache = new Map();

async function loadImage(url) {
  if (cache.has(url)) return cache.get(url);
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => { cache.set(url, img); resolve(img); };
    img.onerror = () => reject(new Error("Image failed"));
    img.src = url;
  });
}

async function render() {
  try {
    status.textContent = "Rendering...";
    const key = `${state.weapon}_${state.size}`;
    const bladeFile = BLADES[key];
    const hilt = HILTS.find(h => h.id === state.hilt);
    const pos = POSITIONS[key];

    if (!bladeFile || !hilt || !pos) throw new Error("Missing config");

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const blade = await loadImage(`${GITHUB_RAW}/${bladeFile}`);
    ctx.drawImage(blade, 0, 0, canvas.width, canvas.height);

    const hiltImg = await loadImage(`${GITHUB_RAW}/${hilt.file}`);
    ctx.drawImage(hiltImg, pos.x, pos.y, pos.w, pos.h);

    status.textContent = `✓ ${state.weapon} ${state.size}" + ${hilt.name}`;
  } catch (err) {
    console.error(err);
    status.textContent = `✗ Error: ${err.message}`;
  }
}

function renderWeapons() {
  const container = document.getElementById("weaponBtns");
  container.innerHTML = "";
  WEAPONS.forEach(w => {
    const btn = document.createElement("button");
    btn.textContent = w.name;
    btn.className = state.weapon === w.id ? "active" : "";
    btn.onclick = () => {
      state.weapon = w.id;
      state.size = w.sizes[0];
      renderWeapons();
      renderSizes();
      render();
    };
    container.appendChild(btn);
  });
}

function renderSizes() {
  const container = document.getElementById("sizeBtns");
  container.innerHTML = "";
  const weapon = WEAPONS.find(w => w.id === state.weapon);
  weapon.sizes.forEach(size => {
    const btn = document.createElement("button");
    btn.textContent = `${size}"`;
    btn.className = state.size === size ? "active" : "";
    btn.onclick = () => {
      state.size = size;
      renderSizes();
      render();
    };
    container.appendChild(btn);
  });
}

function renderHilts() {
  const container = document.getElementById("hiltBtns");
  container.innerHTML = "";
  HILTS.forEach(h => {
    const item = document.createElement("div");
    item.className = "grid-item";
    const btn = document.createElement("button");
    btn.className = state.hilt === h.id ? "active" : "";
    btn.innerHTML = `<span style="font-size:24px;">◆</span><label>${h.name}</label>`;
    btn.onclick = () => {
      state.hilt = h.id;
      renderHilts();
      render();
    };
    item.appendChild(btn);
    container.appendChild(item);
  });
}

// Initialize
renderWeapons();
renderSizes();
renderHilts();
render();
</script>

</body>
</html>
